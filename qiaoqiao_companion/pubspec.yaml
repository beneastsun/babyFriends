name: qiaoqiao_companion
description: "纹纹小伙伴 - 儿童手机使用管理应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^15.1.2

  # 数据库
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5

  # 工具
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  intl: ^0.20.2
  collection: ^1.19.1

  # 家长模式
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3

  # 动画和音效
  lottie: ^3.1.0
  audioplayers: ^6.0.0

  # 数据备份
  share_plus: ^7.2.1
  csv: ^6.0.0

  # 图片选择
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/sounds/

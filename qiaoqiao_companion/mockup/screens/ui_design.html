<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纹纹小伙伴 - UI设计效果图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f5f5f5;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .screen {
            margin-bottom: 40px;
            text-align: center;
        }
        .screen h3 {
            color: #EC8B9F;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .screen img {
            max-width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .color-palette {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            padding: 20px;
            background: #FAF9F8;
            border-radius: 12px;
        }
        .color-item {
            text-align: center;
        }
        .color-box {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            margin-bottom: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-name {
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>纹纹小伙伴 - UI设计效果图</h1>

        <div class="color-palette">
            <div class="color-item">
                <div class="color-box" style="background: #EC8B9F;"></div>
                <div class="color-name">樱花粉<br>#EC8B9F</div>
            </div>
            <div class="color-item">
                <div class="color-box" style="background: #C5B3E6;"></div>
                <div class="color-name">薰衣草<br>#C5B3E6</div>
            </div>
            <div class="color-item">
                <div class="color-box" style="background: #FAF9F8; border: 1px solid #eee;"></div>
                <div class="color-name">暖白<br>#FAF9F8</div>
            </div>
        </div>

        <div class="screen">
            <h3>1. 首页 - 巧巧卡片 + 使用时间圆环 + 应用排行</h3>
            <img src="01_home.png" alt="首页">
        </div>

        <div class="screen">
            <h3>2. 规则页 - 时间规则卡片 + 应用分类开关</h3>
            <img src="02_rules.png" alt="规则页">
        </div>

        <div class="screen">
            <h3>3. 设置页 - 简洁列表风格</h3>
            <img src="03_settings.png" alt="设置页">
        </div>

        <div class="screen">
            <h3>4. 报告页 - 积分卡片 + 周统计柱状图</h3>
            <img src="04_report.png" alt="报告页">
        </div>
    </div>
</body>
</html>
